name: Target Library Drift Check

# Triggered by a completed Upstream Sync. Diffs the upstream Python files
# we plan to accelerate against thoon, and opens (or updates) a tracking
# issue if anything changed. This is the "weekly look at our target lib"
# signal — but driven by the actual upstream sync event, not wall-clock
# cadence.

on:
  workflow_run:
    workflows: ["Upstream Sync"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    # Only run if the sync actually succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout thoon
        uses: actions/checkout@v4
        with:
          ref: thoon
          fetch-depth: 0

      - name: Fetch main
        run: git fetch origin main

      - name: Diff target libs
        id: diff
        run: |
          set -euo pipefail
          TARGETS=(
            tools/registry.py
            model_tools.py
            tools/file_operations.py
            hermes_state.py
            run_agent.py
          )
          CHANGED=()
          for f in "${TARGETS[@]}"; do
            if [ -f "$f" ] && ! git diff --quiet thoon origin/main -- "$f"; then
              CHANGED+=("$f")
            fi
          done

          {
            echo "changed<<EOF"
            printf '%s\n' "${CHANGED[@]+"${CHANGED[@]}"}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "${#CHANGED[@]}" -eq 0 ]; then
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_drift=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update drift issue
        if: steps.diff.outputs.has_drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const changed = `${{ steps.diff.outputs.changed }}`.trim().split('\n').filter(Boolean);
            const sha = context.sha.slice(0, 7);
            const upstreamSha = require('child_process')
              .execSync('git rev-parse --short origin/main')
              .toString().trim();
            const title = 'Upstream drift in target libraries';
            const body = [
              'Upstream has changed one or more Python files that the',
              '`hermes-rust/` workspace targets for acceleration.',
              '',
              `**thoon**: \`${sha}\``,
              `**upstream mirror (origin/main)**: \`${upstreamSha}\``,
              '',
              '**Changed files:**',
              ...changed.map(f => `- \`${f}\``),
              '',
              '**Compare diff:**',
              `https://github.com/${context.repo.owner}/${context.repo.repo}/compare/thoon...main`,
              '',
              '_Auto-opened by `target-lib-check.yml`. Review before opening the next phase PR._',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-drift',
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['upstream-drift'],
              });
            }
