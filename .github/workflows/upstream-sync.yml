name: Upstream Sync

# Fast-forwards origin/main to the newest commit on
# NousResearch/hermes-agent:main whose entire CI is green.
#
# "All green" means: every check run on the SHA has finished
# (`status == "completed"`) and concluded `success`, `skipped`,
# or `neutral`. Any `failure`, `cancelled`, `action_required`,
# `timed_out`, `stale`, or `startup_failure` disqualifies the SHA.
#
# Why this rule:
#   - Following upstream HEAD blindly inherits transient breakage
#     (many recent main commits have failing tests.yml).
#   - Filtering on a single workflow (tests.yml) misses other
#     real signal (lint, security scans).
#   - Tag-only filtering lags too far when upstream releases
#     slow down.
#   - "All checks green on the SHA" is the closest available signal
#     to "this commit is healthy" without judging individual
#     workflows.
#
# Discipline: origin/main is a curated mirror of upstream — nothing
# else in this repo pushes to main. The workflow never rewinds; if
# we're already ahead of the newest green, it's a no-op.

on:
  schedule:
    - cron: '0 6 * * *'   # daily, 06:00 UTC
  workflow_dispatch:       # manual run

permissions:
  contents: write

concurrency:
  group: upstream-sync
  cancel-in-progress: false

env:
  UPSTREAM_REPO: NousResearch/hermes-agent
  # How far back to search in upstream's main history when scanning
  # for a green commit. 300 covers ~2-5 days at upstream's commit
  # cadence — enough headroom for a daily sync to find something.
  SEARCH_LIMIT: '300'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure committer
        run: |
          git config user.name  "hermes-thoon-bot"
          git config user.email "actions@github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream main

      - name: Find newest all-green upstream commit
        id: green
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OUR_MAIN=$(git rev-parse HEAD)
          SHA=""
          # Walk upstream/main newest-first.
          for candidate in $(git log upstream/main --format='%H' -n "$SEARCH_LIMIT"); do
            # If we've walked back to our current main, we're already
            # at (or ahead of) the newest green — quiet no-op.
            if [ "$candidate" = "$OUR_MAIN" ]; then
              echo "Reached our current main ($OUR_MAIN) without finding a newer all-green commit."
              echo "Nothing to do."
              echo "skip=true" >> "$GITHUB_ENV"
              exit 0
            fi

            RUNS=$(gh api "/repos/$UPSTREAM_REPO/commits/$candidate/check-runs?per_page=100" \
              --jq '.check_runs')
            TOTAL=$(echo "$RUNS" | jq 'length')

            if [ "$TOTAL" -eq 0 ]; then
              echo "  $candidate: no check runs — skipping"
              continue
            fi

            INCOMPLETE=$(echo "$RUNS" | jq '[.[] | select(.status != "completed")] | length')
            if [ "$INCOMPLETE" -gt 0 ]; then
              echo "  $candidate: $INCOMPLETE/$TOTAL checks still pending — skipping"
              continue
            fi

            BAD=$(echo "$RUNS" | jq '[.[] | select(.conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral")] | length')
            if [ "$BAD" -gt 0 ]; then
              BAD_DETAIL=$(echo "$RUNS" | jq -r '[.[] | select(.conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral") | "\(.name)=\(.conclusion)"] | join(", ")')
              echo "  $candidate: $BAD non-green ($BAD_DETAIL) — skipping"
              continue
            fi

            SHA="$candidate"
            echo "Selected: $candidate ($TOTAL checks, all completed without failures)"
            break
          done

          if [ -z "$SHA" ]; then
            echo "No all-green upstream commit found in last $SEARCH_LIMIT entries."
            echo "Investigate upstream CI or extend SEARCH_LIMIT."
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Verify SHA lineage
        if: env.skip != 'true'
        run: |
          set -euo pipefail
          SHA="${{ steps.green.outputs.sha }}"

          # Must be reachable from upstream/main (it is by construction,
          # but double-check to catch history rewrites between fetch
          # and now).
          if ! git merge-base --is-ancestor "$SHA" upstream/main; then
            echo "Green SHA $SHA is not an ancestor of upstream/main."
            echo "Upstream may have rewritten history. Aborting."
            exit 1
          fi

          # Must be a descendant of (or equal to) our current main —
          # we never auto-rewind.
          if ! git merge-base --is-ancestor HEAD "$SHA"; then
            echo "Green SHA $SHA is not a descendant of our main."
            echo "main has diverged from the upstream lineage. Aborting."
            exit 1
          fi

      - name: Fast-forward main
        if: env.skip != 'true'
        run: |
          set -euo pipefail
          SHA="${{ steps.green.outputs.sha }}"
          if [ "$(git rev-parse HEAD)" = "$SHA" ]; then
            echo "Already at $SHA — nothing to do."
            exit 0
          fi
          echo "Fast-forwarding main to $SHA."
          git merge --ff-only "$SHA"

      - name: Push
        if: env.skip != 'true'
        run: git push origin main
